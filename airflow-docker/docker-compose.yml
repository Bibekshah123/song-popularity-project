x-airflow-common:
  &airflow-common
  build: .
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ""
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__API__AUTH_BACKENDS: "airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session"
    # Pipeline env vars forwarded to BashOperator tasks
    PROJECT_ROOT: /host_project/song-popularity-mlops
    MARIADB_HOST: mariadb
    MARIADB_PORT: "3306"
    MARIADB_USER: airflow
    MARIADB_PASSWORD: airflow
    MARIADB_DB: songs
    REDIS_HOST: redis
    REDIS_PORT: "6379"
    REDIS_DB: "0"
    MLFLOW_TRACKING_URI: http://mlflow:5000
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./config:/opt/airflow/config
    - ../:/host_project/song-popularity-mlops
  user: "${AIRFLOW_UID:-0}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  # ── PostgreSQL (Airflow metadata DB) ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── MariaDB (pipeline data store) ────────────────────────────────────────────
  mariadb:
    image: mariadb:10.11
    container_name: airflow_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: songs
      MYSQL_USER: airflow
      MYSQL_PASSWORD: airflow
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Redis (pipeline state store) ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: airflow_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: unless-stopped

  # ── MLflow tracking server ───────────────────────────────────────────────────
  mlflow:
    image: python:3.10-slim
    container_name: airflow_mlflow
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "*"
    command: >
      bash -c "pip install mlflow --quiet && mlflow server --backend-store-uri sqlite:////mlflow/mlflow.db --default-artifact-root /mlflow/mlartifacts --host 0.0.0.0 --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ../mlflow.db:/mlflow/mlflow.db
      - ../mlartifacts:/mlflow/mlartifacts
    restart: unless-stopped

  # ── Airflow Init ─────────────────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow_init
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
          --username ${_AIRFLOW_WWW_USER_USERNAME:-airflow} \
          --password ${_AIRFLOW_WWW_USER_PASSWORD:-airflow} \
          --firstname Bibek \
          --lastname Shah \
          --role Admin \
          --email bibek@example.com || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: "true"
      _AIRFLOW_WWW_USER_CREATE: "true"
    depends_on:
      <<: *airflow-common-depends-on

  # ── Airflow Webserver ─────────────────────────────────────────────────────────
  airflow-webserver:
    <<: *airflow-common
    container_name: airflow_webserver
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── Airflow Scheduler ─────────────────────────────────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow_scheduler
    command: scheduler
    healthcheck:
      test: ["CMD", "airflow", "jobs", "check", "--job-type", "SchedulerJob", "--hostname", "$${HOSTNAME}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  # ── FastAPI Backend ───────────────────────────────────────────────────────────
  backend:
    build:
      context: ../app/backend
      dockerfile: Dockerfile
    container_name: song_backend
    ports:
      - "8000:8000"
    environment:
      MODEL_PATH: /project/models/best_model.pkl
      PIPELINE_PATH: /project/data/processed/preprocessing_pipeline.pkl
    volumes:
      - ../:/project
    restart: unless-stopped

  # ── Frontend (Nginx static server) ───────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: song_frontend
    ports:
      - "5500:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  postgres_data:
  mariadb_data: